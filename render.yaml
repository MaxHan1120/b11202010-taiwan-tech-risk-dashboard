services:
  - type: web
    name: taiwan-tech-risk-api
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FINMIND_TOKEN
        sync: false
      - key: RISK_DASHBOARD_DB
        value: data/risk_dashboard.sqlite3
